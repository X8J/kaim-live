name: Sync YouTube Data

on:
  schedule:
    - cron: '0 10 1,15 * *'   # 1st and 15th of each month, 10:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run YouTube data fetch
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node scripts/fetch-yt-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "yt-sync-bot"
          git config user.email "bot@kaim.live"
          git add public/yt-data.json
          git diff --staged --quiet || git commit -m "chore: sync YouTube data [skip ci]"
          git push
